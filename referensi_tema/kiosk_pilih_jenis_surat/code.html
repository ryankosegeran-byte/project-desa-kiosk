<div class="w-[600px] h-[600px] bg-on-tertiary-container rounded-full blur-[100px] translate-y-1/2 -translate-x-1/2"></div>
</div>
<script>
        // Micro-interaction: Ripple effect simulation on large buttons
        document.querySelectorAll('button').forEach(button => {
            button.addEventListener('click', function(e) {
                if (this.classList.contains('bg-primary-container')) return; // Simple debounce
                
                // Visual feedback for touch screens
                this.style.transition = 'transform 0.1s ease-out';
                this.style.transform = 'scale(0.95)';
                setTimeout(() => {
                    this.style.transform = 'scale(1)';
                }, 100);
            });
        });

        // Auto-refresh/Logout simulation if idle (Safety feature for Kiosk)
        let idleTimer;
        function resetTimer() {
            clearTimeout(idleTimer);
            idleTimer = setTimeout(() => {
                alert('Sesi telah berakhir demi keamanan Anda.');
                location.reload();
            }, 60000); // 1 minute idle
        }
        document.onmousemove = resetTimer;
        document.onkeypress = resetTimer;
        document.ontouchstart = resetTimer;
    </script>
